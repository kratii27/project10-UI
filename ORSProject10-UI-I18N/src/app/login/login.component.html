<style type="text/css">
  .log1 {
    padding-top: 5%;
  }

  .input-group-addon {
    box-shadow: 5px 5px 5px #2F4156;
  }

  .grad {
    background-image: linear-gradient(to bottom right, white, #567C8D);
    background-repeat: no-repeat;
    background-size: 100%;
  }

  .p4 {
    background-image: url('assets/files/login.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 85px;
    padding-bottom: 85px;
  }
</style>
<body class="p4">
<div>
  <main>
    <div class="row log1">

      <div class="col-md-4"></div>

      <div class="col-md-4">
        <div class="card input-group-addon grad">
          <div class="card-body">

            <h3 class="text-center text-dark"><b>{{'Login' | translate}}</b></h3>

            <div>
              <H4 align="center">
                <div *ngIf="!form.error && form.message" class="alert alert-success alert-dismissible">
                  <button type="button" class="close" data-dismiss="alert">&times;</button>
                  {{ form.message }}
                </div>
              </H4>
              <H4 align="center">
                <div *ngIf="form.error && form.message" class="alert alert-danger alert-dismissible">
                  <button type="button" class="close" data-dismiss="alert">&times;</button>
                  {{ form.message }}
                </div>
              </H4>
            </div>

            <!-- Login ID -->
            <span class="pl-sm-5"><b>{{'Login Id' | translate}}</b> <span style="color: red;">*</span></span><br>
            <div class="col-sm-12">
              <div class="input-group">
                <div class="input-group-prepend">
                  <div class="input-group-text">
                    <i class="fa fa-envelope grey-text" style="font-size: 1rem;"></i>
                  </div>
                </div>
                <input type="text" class="form-control input-group-addon" name="login"
                  [(ngModel)]="form.data.login" placeholder="Enter Login ID">
              </div>
            </div>
            <font color="red" class="pl-sm-5">{{ form.inputerror.login }}</font><br>

            <!-- Password -->
            <span class="pl-sm-5"><b>{{'Password' | translate}}</b> <span style="color: red;">*</span></span><br>
            <div class="col-sm-12">
              <div class="input-group">
                <div class="input-group-prepend">
                  <div class="input-group-text">
                    <i class="fa fa-lock grey-text" style="font-size: 1rem;"></i>
                  </div>
                </div>
                <input type="password" class="form-control input-group-addon" name="password"
                  [(ngModel)]="form.data.password" placeholder="Enter Password">
              </div>
            </div>
            <font color="red" class="pl-sm-5">{{ form.inputerror.password }}</font><br><br>

            <!-- Buttons -->
            <div class="text-center">
              <input type="submit" (click)="signIn()" class="btn btn-success" style="font-size: 17px" value="{{'Sign In' | translate}}">&nbsp;
              <input type="submit" (click)="signUp()" class="btn btn-primary" style="font-size: 17px" value="{{'Sign Up' | translate}}">
            </div>

            <!-- Forgot Password -->
            <div class="text-center">
              <a [routerLink]="['/forgotpassword']" style="color: black; font-size: 15px;">
                <b><u>{{'Forget my password?' | translate}}</u></b>
              </a>
            </div>

          </div>
        </div>
      </div>

      <div class="col-md-4 mb-4"></div>

      <div class="row log1"></div>
    </div>
  </main>
</div>
</body>
